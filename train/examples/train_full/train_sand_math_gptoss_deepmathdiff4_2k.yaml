### model
model_name_or_path: Qwen/Qwen2.5-32B-Instruct
trust_remote_code: True
### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_config.json
flash_attn: fa2

### dataset
dataset: deepmath_difficulty4_2k
cutoff_len: 32768 #16384
overwrite_cache: true
preprocessing_num_workers: 64
template: qwen

### output
output_dir: /wekafs/machaita/LLaMA-Factory/saves/sand_math_gptoss_deepmathdiff4_2k/Qwen2.5-32B-Instruct
logging_steps: 1
save_strategy: epoch
# save_steps: 0.5
plot_loss: true
overwrite_output_dir: true

##logging
report_to: wandb
run_name: gptoss_deepmathdiff4_2k

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
learning_rate: 5.0e-6
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.0
bf16: true
ddp_timeout: 180000000
